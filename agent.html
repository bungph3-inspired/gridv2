<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="GridV2 Agent Portal — bookie-side dashboard. Entertainment-only.">
  <title>GridV2 · Agent Portal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Fonts (matches player side) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="agent-app" class="flex flex-col h-full">

  <!-- LOGIN SPLASH — shown by default. agent-main.js probes /api/me on boot;
       on 200 it removes the .show class; on 401 the splash stays visible.
       Real auth as of 2026-05-24 (runbook 08 Phase D.1 + D.2).
       Form posts via JS — submitAgentLogin handles the fetch + error UI. -->
  <div class="login-splash show" id="login-splash">
    <div class="login-card">
      <div class="login-brand">Grid<span>V2</span></div>
      <div class="login-sub">Agent / Partner Portal</div>
      <form class="login-form" id="login-form" onsubmit="return submitAgentLogin(event)">
        <label for="login-id">Username</label>
        <input type="text" id="login-id" autocomplete="username" required>
        <label for="login-pw">Password</label>
        <input type="password" id="login-pw" autocomplete="current-password" required>
        <div class="login-error" id="login-error" aria-live="polite"></div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      <div class="login-footer">
        Are you a player? <a href="/index.html">Sign in here</a>
      </div>
    </div>
  </div>

  <!-- DISCLAIMER -->
  <div class="disc"><b>⚠ ENTERTAINMENT ONLY</b> — Virtual currency only. No real money involved. Not affiliated with any gambling operation.</div>

  <!-- AGENT VIEW container — populated by src/agent.js after auth succeeds -->
  <div class="agent-view" id="agent-view"></div>

</div>

<!-- Mock data fixture, loaded before main script so agent.js can read window.AGENT_MOCK.
     Will be displaced by real /api data over Phases D.3 + later. -->
<script src="/agent_mock.js" onerror="window.__noAgentMock=true"></script>

<!-- Agent entry -->
<script type="module" src="/src/agent-main.js"></script>
</body>
</html>
