<svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>GridV2 workflow: current Claude plan vs Claude Max 20x with subagent fleet</title>
  <desc>Side-by-side comparison of two development workflows. Current plan shows a single day-shift with John working solo during waking hours. Max 20x shows a 24-hour rotation with John driving during the day and a four-agent fleet working overnight, opening PRs that John reviews in the morning. Includes a time-to-MVP comparison.</desc>
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#172d33">GridV2 — Two Workflows Compared</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#5a6b72">24-hour productivity rotation, code flow, and time-to-MVP</text>
  <g transform="translate(20,80)">
    <rect x="0" y="0" width="470" height="500" rx="10" fill="#ffffff" stroke="#d9dee0" stroke-width="1.5"/>
    <rect x="0" y="0" width="470" height="38" rx="10" fill="#172d33"/>
    <rect x="0" y="28" width="470" height="10" fill="#172d33"/>
    <text x="20" y="25" font-size="15" font-weight="700" fill="#ffffff">Current Plan — Solo</text>
    <text x="450" y="25" text-anchor="end" font-size="12" fill="#cfd8db">Cowork during waking hours</text>
    <text x="20" y="62" font-size="11" font-weight="600" fill="#5a6b72">24-HOUR DAY</text>
    <rect x="20" y="70" width="430" height="44" rx="6" fill="#f1f3f4" stroke="#dde2e4"/>
    <g font-size="9" fill="#8a999f">
      <text x="20" y="128" text-anchor="start">12am</text>
      <text x="127" y="128" text-anchor="middle">6am</text>
      <text x="235" y="128" text-anchor="middle">12pm</text>
      <text x="343" y="128" text-anchor="middle">6pm</text>
      <text x="450" y="128" text-anchor="end">12am</text>
    </g>
    <rect x="20" y="76" width="125" height="32" rx="4" fill="#e2e6e8"/>
    <text x="82" y="96" text-anchor="middle" font-size="10" fill="#5a6b72" font-weight="600">Sleep · no work</text>
    <rect x="145" y="76" width="270" height="32" rx="4" fill="#e87722"/>
    <text x="280" y="96" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="700">John + Cowork session</text>
    <rect x="415" y="76" width="35" height="32" rx="4" fill="#e2e6e8"/>
    <text x="20" y="158" font-size="11" font-weight="600" fill="#5a6b72">WHO WORKS WHEN</text>
    <rect x="20" y="170" width="430" height="32" rx="4" fill="#fdf2e8"/>
    <text x="32" y="190" font-size="12" fill="#172d33" font-weight="600">John</text>
    <text x="450" y="190" text-anchor="end" font-size="11" fill="#5a6b72">~8 hrs/day · 1 stream</text>
    <rect x="20" y="208" width="430" height="32" rx="4" fill="#f5f6f7" stroke="#e0e4e6" stroke-dasharray="3 3"/>
    <text x="32" y="228" font-size="12" fill="#8a999f">Subagent fleet</text>
    <text x="450" y="228" text-anchor="end" font-size="11" fill="#8a999f">— none —</text>
    <rect x="20" y="246" width="430" height="32" rx="4" fill="#f5f6f7" stroke="#e0e4e6" stroke-dasharray="3 3"/>
    <text x="32" y="266" font-size="12" fill="#8a999f">Teammate</text>
    <text x="450" y="266" text-anchor="end" font-size="11" fill="#8a999f">optional · parallel</text>
    <text x="20" y="305" font-size="11" font-weight="600" fill="#5a6b72">DELIVERY ESTIMATE</text>
    <rect x="20" y="316" width="138" height="68" rx="6" fill="#f7f9fa" stroke="#dde2e4"/>
    <text x="89" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">Productive hrs/wk</text>
    <text x="89" y="365" text-anchor="middle" font-size="22" font-weight="800" fill="#172d33">~40</text>
    <rect x="166" y="316" width="138" height="68" rx="6" fill="#f7f9fa" stroke="#dde2e4"/>
    <text x="235" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">Parallel streams</text>
    <text x="235" y="365" text-anchor="middle" font-size="22" font-weight="800" fill="#172d33">1</text>
    <rect x="312" y="316" width="138" height="68" rx="6" fill="#f7f9fa" stroke="#dde2e4"/>
    <text x="381" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">MVP at 2-3 mo target</text>
    <text x="381" y="365" text-anchor="middle" font-size="18" font-weight="800" fill="#172d33">10-12 wks</text>
    <line x1="20" y1="408" x2="450" y2="408" stroke="#dde2e4"/>
    <text x="20" y="430" font-size="11" fill="#5a6b72">Monthly add-on cost</text>
    <text x="450" y="430" text-anchor="end" font-size="14" font-weight="700" fill="#172d33">$0 extra</text>
    <text x="20" y="455" font-size="11" fill="#5a6b72">Risk</text>
    <text x="450" y="455" text-anchor="end" font-size="11" fill="#5a6b72">Slow nights · no fleet learning</text>
    <text x="20" y="478" font-size="11" fill="#5a6b72">Best for</text>
    <text x="450" y="478" text-anchor="end" font-size="11" fill="#5a6b72">Lowest cost · simplest workflow</text>
  </g>
  <g transform="translate(510,80)">
    <rect x="0" y="0" width="470" height="500" rx="10" fill="#ffffff" stroke="#e87722" stroke-width="2"/>
    <rect x="0" y="0" width="470" height="38" rx="10" fill="#e87722"/>
    <rect x="0" y="28" width="470" height="10" fill="#e87722"/>
    <text x="20" y="25" font-size="15" font-weight="700" fill="#ffffff">Max 20x + Subagent Fleet</text>
    <text x="450" y="25" text-anchor="end" font-size="12" fill="#fde5d2">24-hour rotation</text>
    <text x="20" y="62" font-size="11" font-weight="600" fill="#5a6b72">24-HOUR DAY</text>
    <rect x="20" y="70" width="430" height="44" rx="6" fill="#f1f3f4" stroke="#dde2e4"/>
    <g font-size="9" fill="#8a999f">
      <text x="20" y="128" text-anchor="start">12am</text>
      <text x="127" y="128" text-anchor="middle">6am</text>
      <text x="235" y="128" text-anchor="middle">12pm</text>
      <text x="343" y="128" text-anchor="middle">6pm</text>
      <text x="450" y="128" text-anchor="end">12am</text>
    </g>
    <rect x="20" y="76" width="125" height="32" rx="4" fill="#3c6e76"/>
    <text x="82" y="96" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="700">Fleet · 4 agents</text>
    <rect x="145" y="76" width="270" height="32" rx="4" fill="#e87722"/>
    <text x="280" y="96" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="700">John drives + reviews PRs</text>
    <rect x="415" y="76" width="35" height="32" rx="4" fill="#3c6e76"/>
    <text x="20" y="158" font-size="11" font-weight="600" fill="#5a6b72">WHO WORKS WHEN</text>
    <rect x="20" y="170" width="430" height="32" rx="4" fill="#fdf2e8"/>
    <text x="32" y="190" font-size="12" fill="#172d33" font-weight="600">John</text>
    <rect x="170" y="178" width="245" height="16" rx="3" fill="#e87722"/>
    <text x="450" y="190" text-anchor="end" font-size="11" fill="#5a6b72">~10 hrs/day · review + drive</text>
    <rect x="20" y="208" width="430" height="32" rx="4" fill="#eaf1f2"/>
    <text x="32" y="228" font-size="12" fill="#172d33" font-weight="600">Fleet (4)</text>
    <rect x="120" y="213" width="105" height="6" rx="2" fill="#3c6e76"/>
    <rect x="120" y="221" width="105" height="6" rx="2" fill="#3c6e76"/>
    <rect x="120" y="229" width="105" height="6" rx="2" fill="#3c6e76"/>
    <text x="450" y="228" text-anchor="end" font-size="11" fill="#5a6b72">~7 hrs/night · 4 streams</text>
    <rect x="20" y="246" width="430" height="32" rx="4" fill="#fdf2e8"/>
    <text x="32" y="266" font-size="12" fill="#172d33" font-weight="600">Teammate</text>
    <rect x="170" y="254" width="245" height="16" rx="3" fill="#b0c4c8"/>
    <text x="450" y="266" text-anchor="end" font-size="11" fill="#5a6b72">parallel stream · optional</text>
    <text x="20" y="305" font-size="11" font-weight="600" fill="#5a6b72">DELIVERY ESTIMATE</text>
    <rect x="20" y="316" width="138" height="68" rx="6" fill="#fdf2e8" stroke="#e87722" stroke-width="1.5"/>
    <text x="89" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">Productive hrs/wk</text>
    <text x="89" y="365" text-anchor="middle" font-size="22" font-weight="800" fill="#e87722">~110</text>
    <rect x="166" y="316" width="138" height="68" rx="6" fill="#fdf2e8" stroke="#e87722" stroke-width="1.5"/>
    <text x="235" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">Parallel streams</text>
    <text x="235" y="365" text-anchor="middle" font-size="22" font-weight="800" fill="#e87722">5</text>
    <rect x="312" y="316" width="138" height="68" rx="6" fill="#fdf2e8" stroke="#e87722" stroke-width="1.5"/>
    <text x="381" y="336" text-anchor="middle" font-size="10" fill="#5a6b72">MVP at 2-3 mo target</text>
    <text x="381" y="365" text-anchor="middle" font-size="18" font-weight="800" fill="#e87722">5-6 wks</text>
    <line x1="20" y1="408" x2="450" y2="408" stroke="#dde2e4"/>
    <text x="20" y="430" font-size="11" fill="#5a6b72">Monthly add-on cost</text>
    <text x="450" y="430" text-anchor="end" font-size="14" font-weight="700" fill="#e87722">+$200 Claude Max 20x</text>
    <text x="20" y="455" font-size="11" fill="#5a6b72">Risk</text>
    <text x="450" y="455" text-anchor="end" font-size="11" fill="#5a6b72">PR review load · agent prompt drift</text>
    <text x="20" y="478" font-size="11" fill="#5a6b72">Best for</text>
    <text x="450" y="478" text-anchor="end" font-size="11" fill="#5a6b72">Compounding · serious build pace</text>
  </g>
  <g transform="translate(20,605)">
    <rect x="0" y="0" width="960" height="155" rx="10" fill="#172d33"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#ffffff">Code flow — same gates in both scenarios</text>
    <text x="940" y="28" text-anchor="end" font-size="11" fill="#cfd8db">Branch + PR workflow · nothing hits prod without your review</text>
    <g transform="translate(20,52)">
      <rect x="0" y="0" width="130" height="60" rx="6" fill="#2a464d" stroke="#3c6e76"/>
      <text x="65" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Work</text>
      <text x="65" y="40" text-anchor="middle" font-size="10" fill="#cfd8db">on feature branch</text>
      <text x="65" y="53" text-anchor="middle" font-size="9" fill="#8aa3a8">John, fleet, or teammate</text>
      <path d="M 135 30 L 168 30" stroke="#cfd8db" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="172" y="0" width="130" height="60" rx="6" fill="#2a464d" stroke="#3c6e76"/>
      <text x="237" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. Push + open PR</text>
      <text x="237" y="40" text-anchor="middle" font-size="10" fill="#cfd8db">tests run on CI</text>
      <text x="237" y="53" text-anchor="middle" font-size="9" fill="#8aa3a8">GitHub Actions</text>
      <path d="M 307 30 L 340 30" stroke="#cfd8db" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="344" y="0" width="170" height="60" rx="6" fill="#e87722"/>
      <text x="429" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. John reviews</text>
      <text x="429" y="40" text-anchor="middle" font-size="10" fill="#fde5d2">human gate · morning queue</text>
      <text x="429" y="53" text-anchor="middle" font-size="9" fill="#fde5d2">approve · request changes · close</text>
      <path d="M 519 30 L 552 30" stroke="#cfd8db" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="556" y="0" width="160" height="60" rx="6" fill="#2a464d" stroke="#3c6e76"/>
      <text x="636" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. Merge to main</text>
      <text x="636" y="40" text-anchor="middle" font-size="10" fill="#cfd8db">squash · linear history</text>
      <text x="636" y="53" text-anchor="middle" font-size="9" fill="#8aa3a8">GitHub</text>
      <path d="M 721 30 L 754 30" stroke="#cfd8db" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
      <rect x="758" y="0" width="162" height="60" rx="6" fill="#2a464d" stroke="#3c6e76"/>
      <text x="839" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5. Auto-deploy</text>
      <text x="839" y="40" text-anchor="middle" font-size="10" fill="#cfd8db">CF Pages + VPS deploy</text>
      <text x="839" y="53" text-anchor="middle" font-size="9" fill="#8aa3a8">~2-4 min</text>
    </g>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#cfd8db"/>
      </marker>
    </defs>
  </g>
</svg>
